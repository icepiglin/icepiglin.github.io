<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IcePiglin Games</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(#0a1a2a, #000);
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 40px;
    }

    .game {
      background: #111;
      border-radius: 16px;
      padding: 20px;
      margin: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.6);
    }

    .game h2 {
      margin-bottom: 10px;
    }

    .game p {
      opacity: 0.8;
    }

    .button {
      display: inline-block;
      padding: 14px 24px;
      border-radius: 12px;
      background: #4CAF50;
      color: black;
      font-size: 16px;
      font-weight: bold;
      text-decoration: none;
      margin-top: 12px;
    }

    iframe {
      width: 100%;
      max-width: 552px;
      height: 167px;
      border: none;
      margin-top: 10px;
    }

    a {
      color: #4CAF50;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <h1>My Games</h1>
  <p>Games I’ve made and published on itch.io</p>

  <!-- GAME 1 -->
  <div class="game">
    <h2>EFL soccer sim ultra</h2>
    <p>A detailed soccer system simulator I made with Claude, this is one of three major game development projects I have planned</p>

    <!-- Itch.io embed -->
    <iframe src="https://itch.io/embed/YOUR_GAME_ID"></iframe>

    <br>

    <a class="button" href="https://yourname.itch.io/yourgame" target="_blank">
      Play on itch.io
    </a>
  </div>

  <!-- GAME 2 -->
  <div class="game">
    <h2>Another Game</h2>
    <p>Another project I'm working on.</p>

    <a class="button" href="#">
      Coming Soon
    </a>
  </div>

  <p><a href="index.html">⬅ Back to home</a></p>

</body>
</html>
